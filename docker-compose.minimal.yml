services:
  codex:
    build:
      context: .
      dockerfile: Dockerfile.minimal
      args:
        CODEX_VERSION: "0.135.0"

    image: codex-local:minimal-0.135.0
    container_name: codex-minimal

    working_dir: /workspace

    stdin_open: true
    tty: true

    user: "node"

    volumes:
      - ./project_workspace:/workspace
      - ./coder/.codex:/home/node/.codex

    environment:
      HOME: /home/node

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    pids_limit: 256
    mem_limit: 4g
    cpus: 2.0

    restart: "no"

    command: ["codex"]